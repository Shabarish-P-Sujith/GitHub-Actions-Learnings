name: Matrix Strategy 2

on:
  push:
  workflow_dispatch:

jobs:
  deploy-all-OS:
    strategy:
      matrix:
        os: [ ubuntu-latest, ubuntu-22.04, windows-latest, windows-2022 , macos-latest, macos-12]
        image: [ hello-world, alpine ]
        exclude:
          - os: macos-latest
            image: hello-world
          - os: macos-latest
            image: alpine
          - os: macos-12 
            image: hello-world
          - os: macos-12
            image: alpine 
          - os: windows-latest
            image: alpine
          
    runs-on: ${{ matrix.os }}
    steps:
      - name: Display Docker Details
        run: docker info
      
      - name: Run image on ${{ matrix.os }}
        run: docker run ${{ matrix.image }}